<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>使い方 - 手芸材料費計算</title><style>body{font-family:'Noto Sans JP',sans-serif;background:#1a001a;color:#f3e5f5;max-width:800px;margin:0 auto;padding:2rem 1rem;line-height:1.8}h1,h2{color:#ce93d8}ol{padding-left:1.5rem}li{margin-bottom:0.5rem}a{color:#ce93d8}</style></head><body><h1>使い方</h1><h2>材料費の計算手順</h2><ol><li>プリセット（編み物・縫製・レジンなど）を選ぶか「＋ 材料を追加」で手動入力</li><li>材料名・購入単価・購入量・使用量を入力</li><li>生産数（1回で何個作るか）・制作時間・時給を設定</li><li>「材料費・コストを計算する」をクリック</li><li>1個あたりのコストと販売価格の目安が表示されます</li></ol><p><a href="index.html">← トップへ戻る</a></p></body></html>
